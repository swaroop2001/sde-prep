<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SE-COS — Software Engineering Career Operating System</title>
<script>
  // Theme flash prevention — runs before paint
  (function() {
    var saved = localStorage.getItem('se-cos-theme') || 'system';
    var resolved = saved === 'system' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : saved;
    document.documentElement.setAttribute('data-theme', resolved);
  })();
</script>
<style>
/* ============================================================
   SE-COS — styles.css
   Design tokens, theme system, layout, component styles
   ============================================================ */

:root {
  /* ---- Color tokens (Light) ---- */
  --bg: #F7F8FA;
  --bg-elevated: #FFFFFF;
  --bg-sunken: #EEF0F3;
  --border: #DDE1E7;
  --border-strong: #C5CBD4;
  --text-primary: #15181E;
  --text-secondary: #5B6270;
  --text-tertiary: #8B92A0;

  --accent: #5B8DEF;          /* focus blue */
  --accent-soft: #5B8DEF1A;
  --success: #0E9F87;         /* teal */
  --success-soft: #0E9F871A;
  --warning: #D98C0E;         /* amber */
  --warning-soft: #D98C0E1A;
  --danger: #E0473F;          /* red */
  --danger-soft: #E0473F1A;

  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;

  --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', Consolas, 'Courier New', monospace;

  --shadow-sm: 0 1px 2px rgba(20,22,28,0.06);
  --shadow-md: 0 4px 16px rgba(20,22,28,0.08);
}

[data-theme="dark"] {
  --bg: #0B0E14;
  --bg-elevated: #11151D;
  --bg-sunken: #080A0F;
  --border: #232834;
  --border-strong: #313847;
  --text-primary: #EDEFF3;
  --text-secondary: #9BA2B0;
  --text-tertiary: #6B7280;

  --accent: #6C9BFA;
  --accent-soft: #6C9BFA22;
  --success: #2DD4BF;
  --success-soft: #2DD4BF22;
  --warning: #F5A623;
  --warning-soft: #F5A62322;
  --danger: #F2655C;
  --danger-soft: #F2655C22;

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.5;
  transition: background 200ms ease, color 200ms ease;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

button {
  font-family: inherit;
  cursor: pointer;
}

input, select, textarea {
  font-family: inherit;
  font-size: inherit;
  color: var(--text-primary);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
}
input:focus, select:focus, textarea:focus, button:focus-visible, a:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

.skip-link {
  position: absolute; left: -9999px; top: 0;
  background: var(--accent); color: #fff;
  padding: 10px 16px; border-radius: var(--radius-sm); z-index: 1000;
}
.skip-link:focus { left: 16px; top: 16px; }

/* ---------- App Shell ---------- */
.app-shell {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: 100vh;
}

.sidebar {
  background: var(--bg-elevated);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 16px 12px;
  position: sticky;
  top: 0;
  height: 100vh;
}

.sidebar-logo {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 8px 20px;
  font-weight: 600; font-size: 15px;
}
.sidebar-logo .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }

.nav-list { list-style: none; padding: 0; margin: 0; flex: 1; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: var(--radius-sm);
  color: var(--text-secondary); font-size: 13.5px; font-weight: 500;
  cursor: pointer; margin-bottom: 2px;
}
.nav-item:hover { background: var(--bg-sunken); color: var(--text-primary); }
.nav-item.active { background: var(--accent-soft); color: var(--accent); }
.nav-item .nav-badge {
  margin-left: auto; background: var(--warning-soft); color: var(--warning);
  font-size: 10.5px; font-weight: 600; padding: 1px 6px; border-radius: 8px;
}

.sidebar-footer { border-top: 1px solid var(--border); padding-top: 10px; display: flex; gap: 6px; }
.icon-btn {
  background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm);
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary);
}
.icon-btn:hover { background: var(--bg-sunken); color: var(--text-primary); }

.main-content { padding: 24px 32px 80px; max-width: 1100px; }

/* ---------- Bottom Tab Bar (Mobile) ---------- */
.bottom-tabs {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-elevated); border-top: 1px solid var(--border);
  padding: 6px 4px calc(6px + env(safe-area-inset-bottom));
  z-index: 100;
}
.bottom-tabs-row { display: flex; justify-content: space-around; }
.bottom-tab {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  color: var(--text-tertiary); font-size: 10px; min-width: 44px; min-height: 44px;
  justify-content: center; border-radius: var(--radius-sm); position: relative;
}
.bottom-tab.active { color: var(--accent); }
.bottom-tab .tab-badge {
  position: absolute; top: 2px; right: 10px;
  width: 7px; height: 7px; border-radius: 50%; background: var(--warning);
}

/* ---------- Cards ---------- */
.card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
}
.card-title { font-size: 14px; font-weight: 600; margin: 0 0 10px; }

.grid { display: grid; gap: 14px; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid var(--border); background: var(--bg-elevated);
  color: var(--text-primary); border-radius: var(--radius-sm);
  padding: 8px 14px; font-size: 13px; font-weight: 500;
}
.btn:hover { background: var(--bg-sunken); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { filter: brightness(1.08); }
.btn-danger { background: var(--danger); border-color: var(--danger); color: #fff; }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* ---------- Badges / Pills ---------- */
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.badge-accent { background: var(--accent-soft); color: var(--accent); }
.badge-success { background: var(--success-soft); color: var(--success); }
.badge-warning { background: var(--warning-soft); color: var(--warning); }
.badge-danger { background: var(--danger-soft); color: var(--danger); }
.badge-muted { background: var(--bg-sunken); color: var(--text-secondary); }

/* ---------- Toast ---------- */
#toast-container {
  position: fixed; bottom: 20px; right: 20px; z-index: 1000;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  background: var(--bg-elevated); border: 1px solid var(--border);
  box-shadow: var(--shadow-md); border-radius: var(--radius-sm);
  padding: 10px 16px; font-size: 13px; opacity: 0; transform: translateY(8px);
  transition: opacity 200ms ease, transform 200ms ease;
}
.toast-visible { opacity: 1; transform: translateY(0); }
.toast-success { border-left: 3px solid var(--success); }
.toast-error { border-left: 3px solid var(--danger); }

/* ---------- Command Palette ---------- */
.palette-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 500; align-items: flex-start; justify-content: center; padding-top: 12vh;
}
.palette-overlay.open { display: flex; }
.palette-box {
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: var(--radius-lg); width: 90%; max-width: 560px;
  box-shadow: var(--shadow-md); overflow: hidden;
}
.palette-input {
  width: 100%; border: none; border-bottom: 1px solid var(--border);
  padding: 14px 16px; font-size: 15px; border-radius: 0;
}
.palette-input:focus { outline: none; }
.palette-results { max-height: 320px; overflow-y: auto; }
.palette-item {
  padding: 10px 16px; cursor: pointer; font-size: 13.5px;
  display: flex; justify-content: space-between; align-items: center;
}
.palette-item:hover, .palette-item.selected { background: var(--bg-sunken); }

/* ---------- Responsive ---------- */
@media (max-width: 880px) {
  .app-shell { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .bottom-tabs { display: block; }
  .main-content { padding: 16px 16px 90px; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
}

</style>
</head>

/* ===== lz-string.min.js ===== */
/* ============================================================
   SE-COS — lz-string.min.js
   Minimal, correct LZ-String-compatible compressor.
   Implements compress()/decompress() using LZ78-style dictionary
   coding over 16-bit codepoints, matching lz-string's on-disk
   format so output stays compact and round-trips reliably.
   ============================================================ */
var LZString = (function () {
  function compress(uncompressed) {
    if (uncompressed == null) return '';
    var i, value,
      dictionary = {},
      dictionaryToCreate = {},
      c = '',
      wc = '',
      w = '',
      enlargeIn = 2,
      dictSize = 3,
      numBits = 2,
      result = [],
      data_val = 0,
      data_position = 0;

    function writeBits(numBitsToWrite, val) {
      for (var b = 0; b < numBitsToWrite; b++) {
        data_val = (data_val << 1) | (val & 1);
        val = val >> 1;
        if (data_position == 15) { data_position = 0; result.push(String.fromCharCode(data_val)); data_val = 0; }
        else data_position++;
      }
    }

    for (i = 0; i < uncompressed.length; i += 1) {
      c = uncompressed.charAt(i);
      if (!Object.prototype.hasOwnProperty.call(dictionary, c)) {
        dictionary[c] = dictSize++;
        dictionaryToCreate[c] = true;
      }
      wc = w + c;
      if (Object.prototype.hasOwnProperty.call(dictionary, wc)) {
        w = wc;
      } else {
        emit(w);
        dictionary[wc] = dictSize++;
        w = String(c);
      }
    }

    function emit(w) {
      if (Object.prototype.hasOwnProperty.call(dictionaryToCreate, w)) {
        if (w.charCodeAt(0) < 256) {
          writeBits(numBits, 0);
          writeBits(8, w.charCodeAt(0));
        } else {
          writeBits(numBits, 1);
          writeBits(16, w.charCodeAt(0));
        }
        enlargeIn--;
        if (enlargeIn == 0) { enlargeIn = Math.pow(2, numBits); numBits++; }
        delete dictionaryToCreate[w];
      } else {
        writeBits(numBits, dictionary[w]);
      }
      enlargeIn--;
      if (enlargeIn == 0) { enlargeIn = Math.pow(2, numBits); numBits++; }
    }

    if (w !== '') emit(w);

    // End-of-stream marker
    writeBits(numBits, 2);

    // Flush remaining bits
    while (true) {
      data_val = (data_val << 1);
      if (data_position == 15) { result.push(String.fromCharCode(data_val)); break; }
      else data_position++;
    }
    return result.join('');
  }

  function decompress(compressed) {
    if (compressed == null) return '';
    if (compressed === '') return null;
    var dictionary = [], enlargeIn = 4, dictSize = 4, numBits = 3, entry = '', result = [],
      i, w, bits, resb, maxpower, power, c,
      data = { val: compressed.charCodeAt(0), position: 32768, index: 1 };

    function readBits(n) {
      var b = 0, mp = Math.pow(2, n), p = 1;
      while (p != mp) {
        resb = data.val & data.position;
        data.position >>= 1;
        if (data.position == 0) { data.position = 32768; data.val = compressed.charCodeAt(data.index++); }
        b |= (resb > 0 ? 1 : 0) * p;
        p <<= 1;
      }
      return b;
    }

    for (i = 0; i < 3; i += 1) dictionary[i] = i;

    bits = readBits(2);
    switch (bits) {
      case 0: c = String.fromCharCode(readBits(8)); break;
      case 1: c = String.fromCharCode(readBits(16)); break;
      case 2: return '';
    }
    dictionary[3] = c;
    w = c;
    result.push(c);
    while (true) {
      if (data.index > compressed.length) return '';
      c = readBits(numBits);

      switch (c) {
        case 0:
          dictionary[dictSize++] = String.fromCharCode(readBits(8));
          c = dictSize - 1;
          enlargeIn--;
          break;
        case 1:
          dictionary[dictSize++] = String.fromCharCode(readBits(16));
          c = dictSize - 1;
          enlargeIn--;
          break;
        case 2:
          return result.join('');
      }

      if (enlargeIn == 0) { enlargeIn = Math.pow(2, numBits); numBits++; }

      if (dictionary[c]) entry = dictionary[c];
      else { if (c === dictSize) entry = w + w.charAt(0); else return null; }

      result.push(entry);
      dictionary[dictSize++] = w + entry.charAt(0);
      enlargeIn--;
      w = entry;
      if (enlargeIn == 0) { enlargeIn = Math.pow(2, numBits); numBits++; }
    }
  }

  return { compress: compress, decompress: decompress };
})();
if (typeof module !== 'undefined' && module.exports) module.exports = LZString;

/* ---------- EventBus ---------- */
const EventBus = (() => {
  const listeners = {};
  return {
    on(event, fn) {
      (listeners[event] = listeners[event] || []).push(fn);
      return () => this.off(event, fn);
    },
    off(event, fn) {
      if (!listeners[event]) return;
      listeners[event] = listeners[event].filter(f => f !== fn);
    },
    emit(event, payload) {
      (listeners[event] || []).forEach(fn => {
        try { fn(payload); } catch (e) { console.error(`EventBus listener error on "${event}":`, e); }
      });
    }
  };
})();

/* ---------- Default State Factory ---------- */
function defaultState() {
  return {
    meta: {
      version: '1.0.0',
      createdAt: null,            // null = onboarding not complete
      lastModified: new Date().toISOString(),
      targetDate: null,
      currentLevel: null,         // SDE1 | SDE2 | SDE3 | Staff
      targetCompanies: []
    },
    problems: {},                 // id -> problem object
    resources: {},                // id -> { status, startedAt, completedAt, notes }
    systemDesign: {},             // id -> { status, notes, lastStudied }
    behavioral: {},               // id -> STAR entry
    companies: {},                // id -> { checklistProgress: {} }
    sessions: [],                 // session log array
    streak: { current: 0, longest: 0, lastActiveDate: null, history: {} },
    settings: {
      theme: 'system',
      dailyGoalMinutes: 60,
      lastBackupAt: null
    }
  };
}

/* ---------- Schema Migrator ---------- */
const SchemaMigrator = {
  CURRENT_VERSION: '1.0.0',
  migrate(state) {
    if (!state.meta) state.meta = defaultState().meta;
    if (!state.meta.version) state.meta.version = '1.0.0';
    // Future migrations append here as version-gated steps.
    state.meta.version = this.CURRENT_VERSION;
    return state;
  }
};

  sanitizeNote(text, maxLen = 2000) {

    return text.slice(0, maxLen);

};

/* ---------- StorageManager ---------- */
const StorageManager = {
  KEY: 'se-cos-v1',
  THEME_KEY: 'se-cos-theme',
  VIEW_KEY: 'se-cos-last-view',

  save(state) {
    try {
      const json = JSON.stringify(state);
      const compressed = (window.LZString) ? LZString.compress(json) : json;
      localStorage.setItem(this.KEY, compressed);
      return true;
    } catch (e) {
      console.error('StorageManager.save failed:', e);
      return false;
    }
  },

  load() {
    try {
      const raw = localStorage.getItem(this.KEY);
      if (!raw) return null;
      const json = (window.LZString) ? LZString.decompress(raw) : raw;
      if (!json) return null;
      return JSON.parse(json);
    } catch (e) {
      console.error('StorageManager.load failed:', e);
      return null;
    }
  },

  estimateUsageBytes() {
    let total = 0;
    for (const k in localStorage) {
      if (localStorage.hasOwnProperty(k) && k.startsWith('se-cos')) {
        total += (localStorage[k] || '').length;
      }
    }
    return total;
  },

  estimateUsagePercent() {
    const LIMIT_BYTES = 5 * 1024 * 1024; // 5MB safe ceiling
    return Math.min(100, Math.round((this.estimateUsageBytes() / LIMIT_BYTES) * 100));
  }
};

/* ---------- StateManager ---------- */
const StateManager = {
  state: null,

  init() {
    const loaded = StorageManager.load();
    this.state = loaded ? SchemaMigrator.migrate(loaded) : defaultState();
    if (!this.state.meta.createdAt) {
      EventBus.emit('app:needsOnboarding');
    }
  },

  get(path) {
    if (!path) return this.state;
    return path.split('.').reduce((acc, key) => (acc == null ? acc : acc[key]), this.state);
  },

  /* Deep-set helper */
  update(path, value) {
    const keys = path.split('.');
    let obj = this.state;
    for (let i = 0; i < keys.length - 1; i++) {
      if (obj[keys[i]] == null || typeof obj[keys[i]] !== 'object') obj[keys[i]] = {};
      obj = obj[keys[i]];
    }
    obj[keys[keys.length - 1]] = value;
    this.state.meta.lastModified = new Date().toISOString();
    this.persist();
    EventBus.emit('state:changed', { path, value });
  },

  /* Merge an object into a path (shallow merge at that key) */
  merge(path, partial) {
    const current = this.get(path) || {};
    this.update(path, { ...current, ...partial });
  },

  persist() {
    StorageManager.save(this.state);
  },

  completeOnboarding({ targetCompanies, currentLevel, targetDate }) {
    this.state.meta.createdAt = new Date().toISOString();
    this.state.meta.targetCompanies = targetCompanies;
    this.state.meta.currentLevel = currentLevel;
    this.state.meta.targetDate = targetDate;
    this.persist();
    EventBus.emit('app:onboardingComplete');
  },

  resetAll() {
    localStorage.removeItem(StorageManager.KEY);
    this.state = defaultState();
    this.persist();
    EventBus.emit('app:reset');
  }
};

/* ---------- Router ---------- */
const Router = {
  routes: {},
  current: null,

  register(routeId, renderFn) {
    this.routes[routeId] = renderFn;
  },

  init() {
    window.addEventListener('hashchange', () => this.handleHashChange());
    this.handleHashChange();
  },

  handleHashChange() {
    let hash = (window.location.hash || '#dashboard').replace('#', '');
    if (!this.routes[hash]) hash = 'dashboard';
    this.navigate(hash, false);
  },

  navigate(routeId, updateHash = true) {
    if (!this.routes[routeId]) return;
    this.current = routeId;
    if (updateHash) window.location.hash = `#${routeId}`;
    localStorage.setItem(StorageManager.VIEW_KEY, routeId);
    EventBus.emit('router:navigate', routeId);
    this.routes[routeId]();
  }
};

/* ---------- Theme Manager ---------- */
const ThemeManager = {
  init() {
    const saved = localStorage.getItem(StorageManager.THEME_KEY) || 'system';
    this.apply(saved);
  },
  apply(mode) {
    const root = document.documentElement;
    let resolved = mode;
    if (mode === 'system') {
      resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    root.setAttribute('data-theme', resolved);
    localStorage.setItem(StorageManager.THEME_KEY, mode);
    EventBus.emit('theme:changed', { mode, resolved });
  },
  current() {
    return localStorage.getItem(StorageManager.THEME_KEY) || 'system';
  }
};

/* ---------- Toast System ---------- */
const Toast = {
  show(message, type = 'info', duration = 3000) {
    const container = document.getElementById('toast-container');
    if (!container) return;
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.setAttribute('role', 'status');
    el.textContent = message;
    container.appendChild(el);
    requestAnimationFrame(() => el.classList.add('toast-visible'));
    setTimeout(() => {
      el.classList.remove('toast-visible');
      setTimeout(() => el.remove(), 250);
    }, duration);
  }
};

/* ---------- App Bootstrap ---------- */
const App = {
  init() {
    ThemeManager.init();
    StateManager.init();
    StreakEngine.checkOnLoad();
    this.bindGlobalUI();
    Router.init();
    EventBus.emit('app:ready');
  },

  bindGlobalUI() {
    // Sidebar / tab nav clicks
    document.querySelectorAll('[data-nav]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        Router.navigate(el.getAttribute('data-nav'));
      });
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          Router.navigate(el.getAttribute('data-nav'));
        }
      });
    });

    // Command palette toggle
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        CommandPalette.toggle();
      }
      if (e.key === 'Escape') CommandPalette.close();
    });

    const paletteBtn = document.getElementById('open-palette-btn');
    if (paletteBtn) paletteBtn.addEventListener('click', () => CommandPalette.toggle());

    // Theme toggle button
    const themeBtn = document.getElementById('theme-toggle-btn');
    if (themeBtn) {
      themeBtn.addEventListener('click', () => {
        const modes = ['light', 'dark', 'system'];
        const next = modes[(modes.indexOf(ThemeManager.current()) + 1) % modes.length];
        ThemeManager.apply(next);
      });
    }
  }
};

/* ---------- Shared Helpers ---------- */
function el(tag, attrs = {}, children = []) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') node.className = v;
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2), v);
    else if (k === 'html') node.innerHTML = v;
    else node.setAttribute(k, v);
  }
  (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null) return;
    node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return node;
}

function mount(node) {
  const root = document.getElementById('view-root');
  root.innerHTML = '';
  root.appendChild(node);
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}

function daysUntil(iso) {
  if (!iso) return null;
  const diff = new Date(iso).getTime() - Date.now();
  return Math.ceil(diff / 86400000);
}

function difficultyColor(diff) {
  return { Easy: 'badge-success', Medium: 'badge-warning', Hard: 'badge-danger' }[diff] || 'badge-muted';
}

function getAllProblems() {
  // Merge seed metadata with user-logged state, plus any fully custom user-added problems
  const state = StateManager.get('problems') || {};
  const seedIds = new Set(PROBLEM_SEEDS.map(p => p.id));
  const seeded = PROBLEM_SEEDS.map(seed => ({ ...seed, ...(state[seed.id] || {}), id: seed.id }));
  const custom = Object.keys(state)
    .filter(id => !seedIds.has(id) && state[id].name)
    .map(id => ({ ...state[id], id }));
  return [...seeded, ...custom];
}

function statusBadgeClass(status) {

function markSolved(id) {
  const now = new Date().toISOString();
  const existing = StateManager.get(`problems.${id}`) || {};
  const interval = SRSEngine.nextInterval(existing.reviewInterval || 0, 'medium');
  StateManager.update(`problems.${id}`, {
    ...existing,
    id,
    status: 'solved',
    solvedAt: now,
    reviewInterval: interval,
    nextReview: SRSEngine.addDays(now, interval),
    attemptCount: (existing.attemptCount || 0) + 1
  });
  StreakEngine.logActivity();
  Toast.show('Problem marked solved', 'success');
  renderProblems();
}

/* ============================================================
   SE-COS — analytics.js
   Analytics Engine + View: readiness scoring, canvas charts
   ============================================================ */

const AnalyticsEngine = {
  companyReadiness(companyId) {
    const company = COMPANIES_DB[companyId];
    if (!company) return 0;

    // Checklist completion (50% weight)
    const checklistState = StateManager.get(`companies.${companyId}.checklistProgress`) || {};
    const totalItems = company.checklist.length;
    const doneItems = company.checklist.filter(item => checklistState[item.id]).length;
    const checklistScore = totalItems ? (doneItems / totalItems) : 0;

    // Problem coverage tagged to this company (30% weight)
    const problems = getAllProblems().filter(p => p.companies.includes(companyId));
    const solvedForCompany = problems.filter(p => p.status === 'solved').length;
    const problemScore = problems.length ? Math.min(1, solvedForCompany / Math.max(5, problems.length * 0.6)) : 0;

    // System design coverage relevant to this company (20% weight)
    const relevantTopics = SYSTEM_DESIGN_TOPICS.filter(t => t.companies.includes(companyId));
    const sdState = StateManager.get('systemDesign') || {};
    const masteredTopics = relevantTopics.filter(t => sdState[t.id]?.status === 'mastered').length;
    const sdScore = relevantTopics.length ? (masteredTopics / relevantTopics.length) : 0;

    const total = (checklistScore * 0.5) + (problemScore * 0.3) + (sdScore * 0.2);
    return Math.round(total * 100);
  },

  topicCoverage() {
    const problems = getAllProblems();
    const coverage = {};
    DSA_TOPICS.forEach(topic => {
      const topicProblems = problems.filter(p => p.topics.includes(topic));
      const solved = topicProblems.filter(p => p.status === 'solved').length;
      coverage[topic] = topicProblems.length ? Math.round((solved / topicProblems.length) * 100) : 0;
    });
    return coverage;
  },

  difficultyDistribution() {
    const problems = getAllProblems().filter(p => p.status === 'solved');
    return {
      Easy: problems.filter(p => p.difficulty === 'Easy').length,
      Medium: problems.filter(p => p.difficulty === 'Medium').length,
      Hard: problems.filter(p => p.difficulty === 'Hard').length
    };
  },

  activityHeatmapData() {
    const history = StateManager.get('streak.history') || {};
    return history; // { 'YYYY-MM-DD': count }
  },

  srQueueHealth() {
    const problems = getAllProblems();
    const now = Date.now();
    let due = 0, overdue = 0, upcoming = 0;
    problems.forEach(p => {
      if (!p.nextReview) return;
      const t = new Date(p.nextReview).getTime();
      const diffDays = (t - now) / 86400000;
      if (diffDays < 0) overdue++;
      else if (diffDays <= 1) due++;
      else if (diffDays <= 7) upcoming++;
    });
    return { due, overdue, upcoming };
  }
};

/* ---------- Canvas Chart Helpers ---------- */
function drawBarChart(canvas, data, opts = {}) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const labels = Object.keys(data);
  const values = Object.values(data);
  const max = Math.max(1, ...values);
  const barWidth = W / labels.length * 0.6;
  const gap = W / labels.length * 0.4;
  const styles = getComputedStyle(document.documentElement);
  const color = opts.color || styles.getPropertyValue('--accent').trim();
  const textColor = styles.getPropertyValue('--text-secondary').trim();

  labels.forEach((label, i) => {
    const x = i * (barWidth + gap) + gap / 2;
    const barH = (values[i] / max) * (H - 30);
    ctx.fillStyle = color;
    ctx.fillRect(x, H - barH - 18, barWidth, barH);
    ctx.fillStyle = textColor;
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(String(values[i]), x + barWidth / 2, H - barH - 22);
    ctx.fillText(label.slice(0, 4), x + barWidth / 2, H - 4);
  });
}

function drawRadarChart(canvas, data) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const cx = W / 2, cy = H / 2, radius = Math.min(W, H) / 2 - 24;
  const labels = Object.keys(data);
  const values = Object.values(data);
  const n = labels.length;
  const styles = getComputedStyle(document.documentElement);
  const gridColor = styles.getPropertyValue('--border').trim();
  const accent = styles.getPropertyValue('--accent').trim();
  const textColor = styles.getPropertyValue('--text-secondary').trim();

  // Grid rings
  for (let ring = 1; ring <= 4; ring++) {
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const r = radius * (ring / 4);
      const x = cx + r * Math.cos(angle), y = cy + r * Math.sin(angle);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Data polygon
  ctx.beginPath();
  labels.forEach((label, i) => {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const r = radius * (values[i] / 100);
    const x = cx + r * Math.cos(angle), y = cy + r * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.fillStyle = accent + '33';
  ctx.fill();
  ctx.strokeStyle = accent;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Labels
  ctx.font = '9px sans-serif';
  ctx.fillStyle = textColor;
  ctx.textAlign = 'center';
  labels.forEach((label, i) => {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const x = cx + (radius + 14) * Math.cos(angle), y = cy + (radius + 14) * Math.sin(angle);
    ctx.fillText(label.slice(0, 6), x, y);
  });
}

function drawHeatmap(canvas, historyData) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const cellSize = 11, gap = 2;
  const weeks = 26;
  const styles = getComputedStyle(document.documentElement);
  const sunken = styles.getPropertyValue('--bg-sunken').trim();
  const success = styles.getPropertyValue('--success').trim();

  const today = new Date();
  for (let w = 0; w < weeks; w++) {
    for (let d = 0; d < 7; d++) {
      const date = new Date(today);
      date.setDate(date.getDate() - ((weeks - w) * 7 - d));
      const key = date.toISOString().slice(0, 10);
      const count = historyData[key] || 0;
      ctx.fillStyle = count === 0 ? sunken : success;
      ctx.globalAlpha = count === 0 ? 1 : Math.min(1, 0.3 + count * 0.2);
      ctx.fillRect(w * (cellSize + gap), d * (cellSize + gap), cellSize, cellSize);
      ctx.globalAlpha = 1;
    }
  }
}

function toggleMockTimer() {
  if (MockTimerState.running) {
    clearInterval(MockTimerState.intervalId);
    MockTimerState.running = false;
  } else {
    MockTimerState.running = true;
    MockTimerState.intervalId = setInterval(() => {
      MockTimerState.secondsLeft = Math.max(0, MockTimerState.secondsLeft - 1);
      const display = document.getElementById('timer-display');
      if (display) display.textContent = formatTime(MockTimerState.secondsLeft);
      if (MockTimerState.secondsLeft === 0) { clearInterval(MockTimerState.intervalId); MockTimerState.running = false; Toast.show('Time is up', 'info'); }
    }, 1000);
  }
  renderMock();
}

function resetMockTimer() {
  clearInterval(MockTimerState.intervalId);
  MockTimerState.running = false;
  MockTimerState.secondsLeft = 45 * 60;
  renderMock();
}

function completeMockSession() {
  const sessions = StateManager.get('sessions') || [];
  const elapsedMinutes = Math.round((45 * 60 - MockTimerState.secondsLeft) / 60);
  sessions.push({ date: new Date().toISOString(), type: 'mock', durationMinutes: elapsedMinutes || 1, notes: Validator.sanitizeNote(MockTimerState.notes) });
  StateManager.update('sessions', sessions);
  StreakEngine.logActivity();
  Toast.show('Session logged', 'success');
  resetMockTimer();
}

function exportData() {
  const data = JSON.stringify(StateManager.state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `se-cos-backup-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  StateManager.update('settings.lastBackupAt', new Date().toISOString());
  Toast.show('Backup exported', 'success');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const imported = JSON.parse(reader.result);
      StateManager.state = SchemaMigrator.migrate(imported);
      StateManager.persist();
      Toast.show('Data imported successfully', 'success');
      Router.navigate('dashboard');
    } catch (err) {
      Toast.show('Invalid backup file', 'error');
    }
  };
  reader.readAsText(file);
}


/* ===== storage.js ===== */
/* ============================================================
   SE-COS — storage.js
   SR Engine (SM-2 style) + Search Engine + Command Palette +
   Streak / Gamification Engine

/* ---------- Spaced Repetition Engine ---------- */
const SRSEngine = {
  // Simplified interval schedule (days): 1 -> 3 -> 7 -> 14 -> 30 -> 30 (cap)
  SCHEDULE: [1, 3, 7, 14, 30],

  nextInterval(currentIntervalDays, rating) {
    // rating: 'easy' | 'medium' | 'hard' — hard resets, easy/medium progress schedule
    if (rating === 'hard') return this.SCHEDULE[0];
    const idx = this.SCHEDULE.indexOf(currentIntervalDays);
    if (idx === -1) return this.SCHEDULE[0];
    return this.SCHEDULE[Math.min(idx + 1, this.SCHEDULE.length - 1)];
  },

  addDays(isoDate, days) {
    const d = new Date(isoDate);
    d.setDate(d.getDate() + days);
    return d.toISOString();
  },

  getDueToday(problems) {
    const now = Date.now();
    return problems.filter(p => p.nextReview && new Date(p.nextReview).getTime() <= now);
  },

  rateReview(problemId, rating) {
    const existing = StateManager.get(`problems.${problemId}`) || {};
    const interval = this.nextInterval(existing.reviewInterval || 0, rating);
    const now = new Date().toISOString();
    StateManager.update(`problems.${problemId}`, {
      ...existing,
      reviewInterval: interval,
      nextReview: this.addDays(now, interval),
      status: rating === 'hard' ? 'review' : 'solved'
    });
  }
};

/* ---------- Search Engine ---------- */
const SearchEngine = {
  buildIndex() {
    const index = [];
    Object.values(RESOURCES_DB).forEach(r => index.push({ type: 'Resource', id: r.id, label: r.title, route: 'resources' }));
    Object.values(COMPANIES_DB).forEach(c => index.push({ type: 'Company', id: c.id, label: c.name, route: 'companies' }));
    SYSTEM_DESIGN_TOPICS.forEach(t => index.push({ type: 'System Design', id: t.id, label: t.name, route: 'system-design' }));
    PROBLEM_SEEDS.forEach(p => index.push({ type: 'Problem', id: p.id, label: p.name, route: 'problems' }));
    ['dashboard', 'problems', 'resources', 'companies', 'system-design', 'behavioral', 'roadmap', 'analytics', 'mock', 'settings'].forEach(v =>
      index.push({ type: 'View', id: v, label: v.replace('-', ' '), route: v })
    );
    return index;
  },

  search(query, index) {
    if (!query) return [];
    const q = query.toLowerCase();
    return index
      .map(item => {
        const label = item.label.toLowerCase();
        let rank = -1;
        if (label === q) rank = 0;
        else if (label.startsWith(q)) rank = 1;
        else if (label.includes(q)) rank = 2;
        return { ...item, rank };
      })
      .filter(item => item.rank >= 0)
      .sort((a, b) => a.rank - b.rank)
      .slice(0, 8);
  }
};

/* ---------- Command Palette ---------- */
const CommandPalette = {
  index: null,
  selectedIdx: 0,
  results: [],

  toggle() {
    const overlay = document.getElementById('palette-overlay');
    if (!overlay) return;
    overlay.classList.contains('open') ? this.close() : this.open();
  },

  open() {
    if (!this.index) this.index = SearchEngine.buildIndex();
    const overlay = document.getElementById('palette-overlay');
    overlay.classList.add('open');
    const input = document.getElementById('palette-input');
    input.value = '';
    this.results = [];
    this.renderResults();
    setTimeout(() => input.focus(), 30);
  },

  close() {
    const overlay = document.getElementById('palette-overlay');
    if (overlay) overlay.classList.remove('open');
  },

  onInput(value) {
    this.results = SearchEngine.search(value, this.index);
    this.selectedIdx = 0;
    this.renderResults();
  },

  renderResults() {
    const container = document.getElementById('palette-results');
    if (!container) return;
    container.innerHTML = '';
    this.results.forEach((r, i) => {
      const item = el('div', {
        class: 'palette-item' + (i === this.selectedIdx ? ' selected' : ''),
        onclick: () => this.select(r)
      }, [
        el('span', {}, r.label),
        el('span', { class: 'badge badge-muted' }, r.type)
      ]);
      container.appendChild(item);
    });
  },

  select(item) {
    this.close();
    Router.navigate(item.route);
  },

  moveSelection(delta) {
    if (this.results.length === 0) return;
    this.selectedIdx = (this.selectedIdx + delta + this.results.length) % this.results.length;
    this.renderResults();
  },

  selectCurrent() {
    if (this.results[this.selectedIdx]) this.select(this.results[this.selectedIdx]);
  }
};

/* ---------- Streak / Gamification Engine ---------- */
const StreakEngine = {
  todayKey() {
    return new Date().toISOString().slice(0, 10);
  },

  logActivity() {
    const streak = StateManager.get('streak') || { current: 0, longest: 0, lastActiveDate: null, history: {} };
    const today = this.todayKey();
    const history = { ...streak.history, [today]: (streak.history[today] || 0) + 1 };

    let current = streak.current;
    if (streak.lastActiveDate !== today) {
      const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      current = (streak.lastActiveDate === yesterday) ? streak.current + 1 : 1;
    }
    const longest = Math.max(streak.longest, current);

    StateManager.update('streak', { current, longest, lastActiveDate: today, history });
    this.checkMilestones(current);
  },

  checkOnLoad() {
    const streak = StateManager.get('streak');
    if (!streak || !streak.lastActiveDate) return;
    const today = this.todayKey();
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    if (streak.lastActiveDate !== today && streak.lastActiveDate !== yesterday) {
      // Streak broken
      StateManager.update('streak.current', 0);
    }
  },

  checkMilestones(current) {
    const milestones = [7, 30, 50, 100, 180, 365];
    if (milestones.includes(current)) {
      Toast.show(`${current}-day streak! Keep going.`, 'success', 4000);
    }
  }
};

  /* ---------- Route Registration ---------- */
  Router.register('dashboard', renderDashboard);

  Router.register('companies', renderCompanies);
  Router.register('system-design', renderSystemDesign);

  Router.register('analytics', renderAnalytics);
  Router.register('mock', renderMock);
  Router.register('settings', renderSettings);

  /* ---------- Nav active-state sync ---------- */
  function updateSRBadge() {
    const due = SRSEngine.getDueToday(getAllProblems()).length;
    document.querySelectorAll('.bottom-tab[data-nav="problems"]').forEach(t => {
      let badge = t.querySelector('.tab-badge');
      if (due > 0) {
        if (!badge) { badge = document.createElement('span'); badge.className = 'tab-badge'; t.appendChild(badge); }
      } else if (badge) {
        badge.remove();
      }
    });
    const sidebarBadge = document.getElementById('sidebar-sr-badge');
    if (sidebarBadge) {
      if (due > 0) { sidebarBadge.textContent = String(due); sidebarBadge.style.display = ''; }
      else { sidebarBadge.style.display = 'none'; }
    }
  }

  EventBus.on('router:navigate', (routeId) => {
    document.querySelectorAll('[data-nav]').forEach(el => {
      const isActive = el.getAttribute('data-nav') === routeId;
      el.classList.toggle('active', isActive);
      if (isActive) el.setAttribute('aria-current', 'page'); else el.removeAttribute('aria-current');
    });
    CompaniesViewState.selected = null;
    updateSRBadge();
  });
  EventBus.on('state:changed', updateSRBadge);
  EventBus.on('app:ready', updateSRBadge);

  /* ---------- Onboarding ---------- */
  EventBus.on('app:needsOnboarding', () => {
    const overlay = document.getElementById('onboarding-overlay');
    overlay.style.display = 'flex';

    const companiesContainer = document.getElementById('ob-companies');
    const selected = new Set();
    COMPANY_LIST.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'btn btn-sm';
      btn.textContent = COMPANIES_DB[c].name;
      btn.onclick = () => {
        if (selected.has(c)) { selected.delete(c); btn.classList.remove('btn-primary'); }
        else { selected.add(c); btn.classList.add('btn-primary'); }
      };
      companiesContainer.appendChild(btn);
    });

    document.getElementById('ob-submit').onclick = () => {
      const level = document.getElementById('ob-level').value;
      const dateVal = document.getElementById('ob-date').value;
      const targetDate = dateVal ? new Date(dateVal).toISOString() : null;
      StateManager.completeOnboarding({
        targetCompanies: Array.from(selected),
        currentLevel: level,
        targetDate
      });
      overlay.style.display = 'none';
      Router.navigate('dashboard');
      Toast.show('Roadmap generated. Welcome aboard.', 'success');
    };
  });
</script>
